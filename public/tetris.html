<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris Battle — Game Arena</title>
  <link rel="stylesheet" href="tetris.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap"
    rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="/firebase-init.js"></script>
  <script>
    async function postScore(game, score) {
      try {
        const token = sessionStorage.getItem('arena-token') || (fbAuth.currentUser ? await fbAuth.currentUser.getIdToken() : null);
        if (!token) return;
        await fetch('/api/score', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ game, score }) });
      } catch {}
    }
    function reportScore(game, score) { postScore(game, score); }
  </script>
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h3>Players</h3>
        <span class="player-count" id="playerCount">1</span>
      </div>
      <div class="player-grid" id="playerList"></div>
    </aside>

    <main class="main-content">
      <header class="game-header">
        <button class="btn btn-sm btn-back" id="btnBack">← Lobby</button>
        <button class="btn btn-mobile-toggle" id="btnToggleSidebar" title="Players">👥</button>
        <h1 class="logo logo-sm">TETRIS BATTLE</h1>
        <span class="room-badge" id="roomBadge"></span>
        <button class="btn btn-mobile-toggle" id="btnToggleChat" title="Chat">💬</button>
      </header>

      <div class="controls">
        <button class="btn btn-primary" id="btnStart">Start</button>
        <button class="btn btn-accent" id="btnBattle">Battle</button>
        <div class="ai-controls">
          <select id="aiDifficulty">
            <option value="easy">AI: Easy</option>
            <option value="medium" selected>AI: Medium</option>
            <option value="hard">AI: Hard</option>
            <option value="godlike">AI: Godlike</option>
          </select>
          <button class="btn btn-ai" id="btnVsAI">VS AI</button>
        </div>
        <button class="btn btn-skin" id="btnSkin">🎨 Skin</button>
      </div>

      <div class="status" id="status">Connecting…</div>

      <div class="game-area">
        <div class="side-panel">
          <div class="panel-box"><span class="panel-label">HOLD</span><canvas id="holdCanvas" width="100"
              height="80"></canvas></div>
          <div class="panel-box"><span class="panel-label">SCORE</span><span class="panel-value"
              id="panelScore">0</span></div>
          <div class="panel-box"><span class="panel-label">LEVEL</span><span class="panel-value"
              id="panelLevel">1</span></div>
          <div class="panel-box"><span class="panel-label">LINES</span><span class="panel-value"
              id="panelLines">0</span></div>
          <div class="panel-box garbage-box"><span class="panel-label">GARBAGE</span><span class="panel-value"
              id="panelGarbage">0</span></div>
        </div>
        <div class="board-wrap"><canvas id="boardCanvas"></canvas></div>
        <div class="side-panel">
          <div class="panel-box"><span class="panel-label">NEXT</span><canvas id="nextCanvas" width="100"
              height="260"></canvas></div>
        </div>
      </div>

      <div class="legend">
        <span>← → Move</span><span>↑ Rotate</span><span>↓ Soft Drop</span><span>Space Hard Drop</span><span>C
          Hold</span>
      </div>
    </main>
    <aside class="chat-panel">
      <div class="chat-header">Chat</div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-row">
        <input class="chat-input" id="chatInput" type="text" placeholder="Message…" maxlength="200" autocomplete="off">
        <button class="btn chat-send-btn" id="chatSend">&uarr;</button>
      </div>
    </aside>
  </div>

  <!-- SKIN MODAL -->
  <div class="skin-modal" id="skinModal">
    <div class="skin-modal-card">
      <div class="skin-modal-header">
        <h2 class="skin-modal-title">🎨 Piece Skins</h2>
        <button class="skin-modal-close" id="skinClose">✕</button>
      </div>
      <p class="skin-modal-sub" id="skinSub">Loading…</p>
      <div class="skin-grid" id="skinGrid"></div>
    </div>
  </div>

  <!-- OVERLAYS -->
  <div class="overlay" id="countdownOverlay">
    <div class="countdown-num" id="countdownText">3</div>
    <div class="countdown-sub">Battle starting…</div>
  </div>
  <div class="overlay" id="gameOverOverlay">
    <h2 class="go-title" id="goTitle">GAME OVER</h2>
    <div class="win-stats">
      <div>Score: <span id="goScore">0</span></div>
      <div>Lines: <span id="goLines">0</span></div>
      <div>Level: <span id="goLevel">1</span></div>
    </div>
    <button class="btn btn-primary btn-lg" id="btnRestart">Play Again</button>
  </div>
  <canvas id="confetti"></canvas>
  <div class="panel-backdrop" id="panelBackdrop"></div>
  <script>
    (function () {
      var sidebar = document.querySelector('.sidebar');
      var chat = document.querySelector('.chat-panel');
      var backdrop = document.getElementById('panelBackdrop');
      var btnSidebar = document.getElementById('btnToggleSidebar');
      var btnChat = document.getElementById('btnToggleChat');
      function closeAll() { sidebar.classList.remove('open'); chat.classList.remove('open'); backdrop.classList.remove('show'); }
      btnSidebar.addEventListener('click', function () { var o = sidebar.classList.contains('open'); closeAll(); if (!o) { sidebar.classList.add('open'); backdrop.classList.add('show'); } });
      btnChat.addEventListener('click', function () { var o = chat.classList.contains('open'); closeAll(); if (!o) { chat.classList.add('open'); backdrop.classList.add('show'); } });
      backdrop.addEventListener('click', closeAll);
    })();
  </script>
  <script src="tetris.js"></script>
</body>

</html>
