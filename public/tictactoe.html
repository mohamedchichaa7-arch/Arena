<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite Tic Tac Toe — Game Arena</title>
  <link rel="stylesheet" href="tictactoe.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h3>Players</h3>
        <span class="player-count" id="playerCount">1</span>
      </div>
      <div class="player-grid" id="playerList"></div>
    </aside>

    <main class="main-content">
      <header class="game-header">
        <button class="btn btn-sm btn-back" id="btnBack">← Lobby</button>
        <h1 class="logo logo-sm">INFINITE TIC TAC TOE</h1>
        <span class="room-badge" id="roomBadge"></span>
      </header>

      <div class="controls">
        <button class="btn btn-primary" id="btnNewGame">New Game</button>
      </div>

      <div class="status" id="status">Connecting…</div>

      <div class="board-area">
        <div class="board" id="board">
          <div class="cell" data-i="0"></div>
          <div class="cell" data-i="1"></div>
          <div class="cell" data-i="2"></div>
          <div class="cell" data-i="3"></div>
          <div class="cell" data-i="4"></div>
          <div class="cell" data-i="5"></div>
          <div class="cell" data-i="6"></div>
          <div class="cell" data-i="7"></div>
          <div class="cell" data-i="8"></div>
          <div class="win-line" id="winLine"></div>
        </div>
      </div>

      <div class="scoreboard">
        <div class="score-item x-score">
          <span class="score-symbol">✕</span>
          <span class="score-val" id="scoreX">0</span>
        </div>
        <div class="score-item draw-score">
          <span class="score-symbol">—</span>
          <span class="score-val" id="scoreDraw">0</span>
        </div>
        <div class="score-item o-score">
          <span class="score-symbol">○</span>
          <span class="score-val" id="scoreO">0</span>
        </div>
      </div>

      <div class="legend">
        <span>Oldest piece vanishes after 3 each</span>
      </div>
    </main>

    <aside class="chat-panel">
      <div class="chat-header">Chat</div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-row">
        <input class="chat-input" id="chatInput" type="text" placeholder="Message…" maxlength="200" autocomplete="off">
        <button class="btn chat-send-btn" id="chatSend">&uarr;</button>
      </div>
    </aside>
  </div>

  <!-- OVERLAYS -->
  <div class="overlay" id="resultOverlay">
    <h2 class="result-title" id="resultTitle">X WINS!</h2>
    <button class="btn btn-primary btn-lg" id="btnRematch">Rematch</button>
  </div>
  <canvas id="confetti"></canvas>
  <script src="tictactoe.js"></script>
</body>

</html>
