<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maze Runner — Game Arena</title>
  <link rel="stylesheet" href="maze.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap"
    rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="/firebase-init.js"></script>
  <script>
    async function postScore(game, score) {
      try {
        const token = sessionStorage.getItem('arena-token') || (fbAuth.currentUser ? await fbAuth.currentUser.getIdToken() : null);
        if (!token) return;
        await fetch('/api/score', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ game, score }) });
      } catch {}
    }
    function reportScore(game, score) { postScore(game, score); }
  </script>
</head>

<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3>Players</h3>
        <span class="player-count" id="playerCount">1</span>
      </div>
      <div class="player-grid" id="playerList"></div>
    </aside>
    <main class="main-content">
      <header class="game-header">
        <button class="btn btn-sm btn-back" id="btnBack">← Lobby</button>
        <button class="btn btn-mobile-toggle" id="btnToggleSidebar" title="Players">👥</button>
        <h1 class="logo logo-sm">MAZE RUNNER</h1>
        <span class="room-badge" id="roomBadge"></span>
        <button class="btn btn-mobile-toggle" id="btnToggleChat" title="Chat">💬</button>
      </header>
      <div class="controls">
        <label>Size <select id="sizeSelect">
            <option value="10">10×10</option>
            <option value="15" selected>15×15</option>
            <option value="20">20×20</option>
            <option value="25">25×25</option>
            <option value="30">30×30</option>
          </select></label>
        <label>Algo <select id="algoSelect">
            <option value="kruskal" selected>Kruskal's</option>
            <option value="dfs">Recursive Backtracker</option>
            <option value="prims">Prim's</option>
            <option value="aldous-broder">Aldous-Broder</option>
            <option value="wilson">Wilson's</option>
            <option value="hunt-and-kill">Hunt &amp; Kill</option>
            <option value="sidewinder">Sidewinder</option>
            <option value="binary-tree">Binary Tree</option>
            <option value="eller">Eller's</option>
            <option value="growing-tree">Growing Tree</option>
            <option value="recursive-division">Recursive Division</option>
          </select></label>
        <label>Speed <input type="range" id="speedRange" min="1" max="100" value="50"><span
            id="speedLabel">50</span></label>
        <button class="btn btn-primary" id="btnGenerate">Generate</button>
        <div class="race-controls">
          <select id="raceMode">
            <option value="same">Race: Same Map</option>
            <option value="individual">Race: Own Maps</option>
          </select>
          <button class="btn btn-accent" id="btnRace">Start Race</button>
        </div>
        <div class="race-controls">
          <select id="aiDifficulty">
            <option value="easy">AI: Easy</option>
            <option value="medium" selected>AI: Medium</option>
            <option value="hard">AI: Hard</option>
            <option value="godlike">AI: Godlike</option>
          </select>
          <button class="btn btn-ai" id="btnVsAI">VS AI</button>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><span class="stat-label">Moves</span><span class="stat-value" id="statMoves">0</span></div>
        <div class="stat"><span class="stat-label">Time</span><span class="stat-value" id="statTime">0:00</span></div>
        <div class="stat"><span class="stat-label">Cells</span><span class="stat-value" id="statCells">0</span></div>
      </div>
      <div class="status" id="status">Connecting…</div>
      <div class="maze-wrapper"><canvas id="mazeCanvas"></canvas><span id="secretDot"></span></div>
      <div class="legend">
        <span>←→↑↓ Move</span><span>🟢 You</span><span>⭐ Goal</span><span>🔴 AI</span>
      </div>
    </main>
    <aside class="chat-panel">
      <div class="chat-header">Chat</div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-row">
        <input class="chat-input" id="chatInput" type="text" placeholder="Message…" maxlength="200" autocomplete="off">
        <button class="btn chat-send-btn" id="chatSend">&uarr;</button>
      </div>
    </aside>
  </div>
  <div class="overlay" id="countdownOverlay">
    <div class="countdown-num" id="countdownText">3</div>
    <div class="countdown-sub" id="countdownSub">Race starting…</div>
  </div>
  <div class="overlay" id="winOverlay">
    <h2 class="win-title" id="winTitle">YOU WIN!</h2>
    <div class="win-stats">
      <div>Time: <span id="winTime">0:00</span></div>
      <div>Moves: <span id="winMoves">0</span></div>
    </div><button class="btn btn-primary btn-lg" id="btnPlayAgain">Play Again</button>
  </div>
  <div class="overlay" id="raceResultsOverlay">
    <h2 class="results-title">Race Results</h2>
    <div id="raceResultsList" class="results-list"></div><button class="btn btn-primary btn-lg"
      id="btnRaceClose">Continue</button>
  </div>
  <canvas id="confetti"></canvas>
  <div class="panel-backdrop" id="panelBackdrop"></div>
  <script>
    (function () {
      var sidebar = document.querySelector('.sidebar');
      var chat = document.querySelector('.chat-panel');
      var backdrop = document.getElementById('panelBackdrop');
      var btnSidebar = document.getElementById('btnToggleSidebar');
      var btnChat = document.getElementById('btnToggleChat');
      function closeAll() { sidebar.classList.remove('open'); chat.classList.remove('open'); backdrop.classList.remove('show'); }
      btnSidebar.addEventListener('click', function () { var o = sidebar.classList.contains('open'); closeAll(); if (!o) { sidebar.classList.add('open'); backdrop.classList.add('show'); } });
      btnChat.addEventListener('click', function () { var o = chat.classList.contains('open'); closeAll(); if (!o) { chat.classList.add('open'); backdrop.classList.add('show'); } });
      backdrop.addEventListener('click', closeAll);
    })();
  </script>
  <script src="maze.js"></script>
</body>

</html>
